name: Go Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: main
     
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache-dependency-path: main/go.sum

      - name: Build
        run: |
          cd main
          go build -v ./...

      # - name: Test
      #   run: go test -v ./...